<!doctype html>
<html lang="bg">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />

<title>Поръчка — Миноксидил 2% 50 ml | MinoxidilBG</title>
<meta name="description" content="Поръчка на Миноксидил 2% - 50 ml.">

<link rel="canonical" href="https://minoxidilbg.com/minoxidil-2-50/checkout.html">

<style>
:root{--cta:#ff7a59;--muted:#6b7280}
body{margin:0;font-family:Inter,Arial;background:#fff}
.container{max-width:760px;margin:auto;padding:20px}
.card{border:1px solid #eee;border-radius:12px;padding:18px}
h1{margin:0 0 14px;font-size:1.7rem}
p{color:var(--muted)}
label{display:block;font-weight:600;margin:14px 0 6px}
input, textarea, select{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
  font:inherit;
}
textarea{min-height:110px}
button{
  display:inline-block;
  background:var(--cta);
  color:#fff;
  padding:16px;
  border-radius:10px;
  font-weight:700;
  border:none;
  cursor:pointer;
  margin-top:16px;
  width:100%;
}
.summary{
  background:#fff4f0;
  border-radius:10px;
  padding:14px;
  margin:16px 0;
}
.small{font-size:.95rem;color:var(--muted)}
.hp-field{
  position:absolute !important;
  left:-5000px !important;
  opacity:0 !important;
}
</style>
</head>

<body>

<main class="container">
<div class="card">

<h1>Поръчка — Миноксидил 2% 50 ml</h1>
<p>Попълнете данните и ще се свържем с вас за потвърждение.</p>

<div class="summary">
  <div><strong>Продукт:</strong> Миноксидил 2%</div>
  <div><strong>Размер:</strong> 50 ml</div>
  <div><strong>Количество:</strong> <span id="qtyText">1 бр</span></div>
  <div><strong>Общо:</strong> <span id="totalText">15.00 €</span></div>
</div>

<form action="https://api.web3forms.com/submit" method="POST" id="orderForm">

<input type="hidden" name="access_key" value="5e916cd2-7828-4c91-acdc-0a675769269f">
<input type="hidden" name="subject" value="Нова поръчка — Миноксидил 2% 50 ml">
<input type="hidden" name="from_name" value="MinoxidilBG Orders">

<input type="hidden" name="product" value="Миноксидил 2%">
<input type="hidden" name="size" value="50 ml">

<input type="hidden" name="qty" id="qtyField" value="1">
<input type="hidden" name="total" id="totalField" value="15.00 €">

<input type="hidden" name="redirect" id="redirectField" value="https://minoxidilbg.com/minoxidil-2-50/thanks.html?qty=1">

<!-- honeypot -->
<input type="checkbox" name="botcheck" class="hp-field">

<label>Име</label>
<input type="text" name="name" required>

<label>Телефон</label>
<input type="text" name="phone" required>

<label>Email</label>
<input type="email" name="email">

<label>Град / Адрес / Офис</label>
<textarea name="address" required></textarea>

<label>Количество</label>
<select id="qtySelect">
  <option value="1">1 бр</option>
  <option value="2">2 бр</option>
  <option value="3">3 бр</option>
</select>

<label>Бележка</label>
<textarea name="message"></textarea>

<button type="submit">Изпрати поръчката</button>

</form>

<p class="small">Ще се свържем с вас за потвърждение.</p>

</div>
</main>

<script>
const prices = {
  1: 15.00,
  2: 28.00,
  3: 39.00
};

function getQtyFromUrl(){
  const params = new URLSearchParams(window.location.search);
  const q = params.get("qty");
  return prices[q] ? q : "1";
}

function updateOrder(qty){
  const total = prices[qty];

  document.getElementById("qtySelect").value = qty;
  document.getElementById("qtyField").value = qty;
  document.getElementById("totalField").value = total.toFixed(2) + " €";

  document.getElementById("qtyText").textContent = qty + " бр";
  document.getElementById("totalText").textContent = total.toFixed(2) + " €";

  document.getElementById("redirectField").value =
    "https://minoxidilbg.com/minoxidil-2-50/thanks.html?qty=" + qty;
}

const initialQty = getQtyFromUrl();
updateOrder(initialQty);

document.getElementById("qtySelect").addEventListener("change", function(){
  updateOrder(this.value);
});
</script>

</body>
</html>
